name: Task Monitor (Twice Daily)

on:
  schedule:
    # 1:00 AM EST = 06:00 UTC
    - cron: '0 6 * * *'
    # 1:00 PM EST = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab anytime

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan-tasks:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run task monitor scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_MANAGER_ID: ${{ secrets.SLACK_MANAGER_ID }}
          LOOKBACK_DAYS: '14'
        run: node scan.js

      - name: Save deduplication state
        if: always()
        run: |
          git config user.name "Task Monitor Bot"
          git config user.email "actions@github.com"
          git add scheduled-reminders.json || true
          git diff --staged --quiet || git commit -m "chore: update scheduled reminders state [skip ci]"
          git push || true
